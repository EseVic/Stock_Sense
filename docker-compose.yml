version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: stocksense_db
    environment:
      POSTGRES_DB:       stocksense
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ML Service (Flask + scikit-learn) ────────────────────────────────────────
  ml-service:
    build: ./ml-service
    container_name: stocksense_ml
    ports:
      - "5001:5001"
    volumes:
      - ./ml-service/models:/app/models
      - ./ml-service/data:/app/data
    environment:
      FLASK_ENV: production
    restart: unless-stopped

  # ── Backend (Node.js / Express) ───────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: stocksense_backend
    ports:
      - "3001:3001"
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     stocksense
      DB_USER:     postgres
      DB_PASS:     postgres
      ML_URL:      http://ml-service:5001
      JWT_SECRET:  stocksense_jwt_secret_2026
      PORT:        3001
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started
    restart: unless-stopped

  # ── Frontend (React + Vite) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stocksense_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
